version: '3.9'

services:
  # ─── Database ───────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: satyacheck-db
    environment:
      POSTGRES_DB: fakenews_db
      POSTGRES_USER: satyacheck
      POSTGRES_PASSWORD: ${DB_PASSWORD:-satyacheck_secure_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U satyacheck"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

  # ─── Backend API ────────────────────────────────────────
  api:
    build: .
    container_name: satyacheck-api
    environment:
      DATABASE_URL: postgresql://satyacheck:${DB_PASSWORD:-satyacheck_secure_2024}@db/fakenews_db
      DEV_MODE: "false"
      MODEL_PATH: /app/multilingual_model.pkl
      VECTORIZER_PATH: /app/vectorizer.pkl
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./ml:/app/ml_files:ro  # Mount ML models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Nginx Reverse Proxy ────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: satyacheck-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
